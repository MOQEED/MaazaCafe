[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/docs"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

[build.env]
PYTHON_VERSION = "3.11"

[build.buildCommand]
command = "cd MaazaCafe && npm install && npm run build && cp -r dist ../backend/static && cd ../backend && pip install -r requirements.txt"

[env]
MONGO_URL = "mongodb://localhost:27017"  # Replace with your MongoDB Atlas URL
DATABASE_NAME = "maaza_cafe"
SECRET_KEY = "your-super-secret-key-change-this-in-production"